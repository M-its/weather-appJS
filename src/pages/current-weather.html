<div class="text-center currentWeatherContainer">

    <!-- Location -->
    <div class="skeleton h-7 max-[380px]:h-4 sm:h-5
                w-1/2 max-[380px]:w-2/3
                rounded-lg mx-auto
                mb-5 max-[380px]:mb-2 sm:mb-6"></div>
    <h1
        class="text-2xl max-[380px]:text-base sm:text-xl font-bold mb-5 max-[380px]:mb-2 sm:mb-6 weather_location hidden">
    </h1>

    <!-- Icon -->
    <div class="weather_icon">
        <div class="skeleton rounded-full mx-auto
                    w-24 h-24 max-[380px]:w-14 max-[380px]:h-14 sm:w-24 sm:h-24
                    mb-2 max-[380px]:mb-1 sm:mb-3"></div>
    </div>

    <!-- Temperature -->
    <div class="skeleton h-[4.5rem] max-[380px]:h-9 sm:h-[3.75rem]
                w-1/3 max-[380px]:w-2/5
                rounded-lg mx-auto mt-2"></div>
    <p class="text-7xl max-[380px]:text-4xl sm:text-6xl font-bold weather_temperature hidden"></p>

    <!-- Weather -->
    <div class="skeleton h-5 max-[380px]:h-4
                w-1/3 max-[380px]:w-2/5
                rounded-lg mx-auto mt-3 mb-2"></div>
    <p
        class="text-lg max-[380px]:text-sm sm:text-lg mt-2 max-[380px]:mt-1 sm:mt-2 text-slate-400 weather_condition capitalize hidden">
    </p>

    <!-- Min / Max -->
    <div class="flex gap-6 justify-center mt-5 max-[380px]:mt-2 sm:mt-5 mb-6 max-[380px]:mb-3 sm:mb-6">
        <div class="skeleton h-5 max-[380px]:h-3.5 w-14 max-[380px]:w-10 rounded-lg"></div>
        <div class="skeleton h-5 max-[380px]:h-3.5 w-14 max-[380px]:w-10 rounded-lg"></div>
    </div>
    <div
        class="flex gap-6 justify-center mt-5 max-[380px]:mt-2 sm:mt-5 mb-6 max-[380px]:mb-3 sm:mb-6 text-lg max-[380px]:text-sm sm:text-base text-slate-300 hidden weather_minmax_row">
        <p class="weather_min"></p>
        <p class="weather_max"></p>
    </div>

    <!-- Details card -->
    <div class="grid grid-cols-2 gap-3 max-[380px]:gap-2 sm:gap-3 mb-6 max-[380px]:mb-3 sm:mb-6 weather_cards_skeleton">
        <div class="skeleton h-20 max-[380px]:h-12 sm:h-[4.5rem] rounded-xl"></div>
        <div class="skeleton h-20 max-[380px]:h-12 sm:h-[4.5rem] rounded-xl"></div>
        <div class="skeleton h-20 max-[380px]:h-12 sm:h-[4.5rem] rounded-xl"></div>
        <div class="skeleton h-20 max-[380px]:h-12 sm:h-[4.5rem] rounded-xl"></div>
    </div>

    <div
        class="grid grid-cols-2 gap-3 max-[380px]:gap-2 sm:gap-3 mb-6 max-[380px]:mb-3 sm:mb-6 hidden weather_cards_real">
        <div class="flex items-center bg-slate-800 p-5 max-[380px]:p-2 sm:p-4 rounded-xl hover:bg-white/5 duration-300">
            <i
                class="fa-solid fa-temperature-full mr-5 max-[380px]:mr-2 sm:mr-3 text-2xl max-[380px]:text-base sm:text-2xl w-9 max-[380px]:w-5 sm:w-8 text-slate-400"></i>
            <div class="text-left">
                <p class="text-sm max-[380px]:text-[10px] sm:text-xs text-slate-400">Sensação térmica</p>
                <p class="weather_real_feel text-lg max-[380px]:text-xs sm:text-base font-medium"></p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-5 max-[380px]:p-2 sm:p-4 rounded-xl hover:bg-white/5 duration-300">
            <i
                class="fa-solid fa-droplet mr-5 max-[380px]:mr-2 sm:mr-3 text-2xl max-[380px]:text-base sm:text-2xl w-9 max-[380px]:w-5 sm:w-8 text-slate-400"></i>
            <div class="text-left">
                <p class="text-sm max-[380px]:text-[10px] sm:text-xs text-slate-400">Humidade</p>
                <p class="weather_humidity text-lg max-[380px]:text-xs sm:text-base font-medium"></p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-5 max-[380px]:p-2 sm:p-4 rounded-xl hover:bg-white/5 duration-300">
            <i
                class="fa-solid fa-wind mr-5 max-[380px]:mr-2 sm:mr-3 text-2xl max-[380px]:text-base sm:text-2xl w-9 max-[380px]:w-5 sm:w-8 text-slate-400"></i>
            <div class="text-left">
                <p class="text-sm max-[380px]:text-[10px] sm:text-xs text-slate-400">Vento</p>
                <p class="weather_wind text-lg max-[380px]:text-xs sm:text-base font-medium"></p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-5 max-[380px]:p-2 sm:p-4 rounded-xl hover:bg-white/5 duration-300">
            <i
                class="fa-solid fa-cloud-showers-heavy mr-5 max-[380px]:mr-2 sm:mr-3 text-2xl max-[380px]:text-base sm:text-2xl w-9 max-[380px]:w-5 sm:w-8 text-slate-400"></i>
            <div class="text-left">
                <p class="text-sm max-[380px]:text-[10px] sm:text-xs text-slate-400">Chuva / hora</p>
                <p class="weather_rain_chance text-lg max-[380px]:text-xs sm:text-base font-medium"></p>
            </div>
        </div>
    </div>
</div>

<footer class="w-full text-center pt-2 pb-1">
    <a class="inline-block bg-slate-800 text-white rounded-full px-9 max-[380px]:px-5 py-3 max-[380px]:py-2
              cursor-pointer hover:bg-slate-700 duration-300 weather_extended
              text-lg max-[380px]:text-sm sm:text-base font-medium" href="/forecast" onclick="route()">
        Próximos dias
    </a>
</footer>
