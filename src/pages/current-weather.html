<div class="text-center currentWeatherContainer">
    <h1 class="text-center text-xl font-bold mb-8 weather_location">Rio de Janeiro, Brasil</h1>

    <div class="weather_icon">
        <img class="w-24 block mx-auto mb-4" src="https://openweathermap.org/img/wn/04d@4x.png" alt="clouds">
    </div>

    <p class="text-5xl mr-0 weather_temperature">23 <span class="ml-[-16px] text-lg align-top">&#176C</span>
    </p>

    <p class="text-lg mt-2 weather_condition capitalize">nublado</p>

    <div class="flex gap-4 justify-center mt-10 mb-4">
        <p class="weather_min">Min: 21&#176</p>
        <p class="weather_max">Max: 31&#176</p>
    </div>

    <div class="grid grid-rows-4 sm:grid-rows-2 grid-flow-col gap-4 my-12">
        <div class="flex items-center bg-slate-800 p-4 rounded-lg hover:bg-white/5 duration-300">
            <i class="fa-solid fa-temperature-full mr-4 text-3xl w-8"></i>
            <div class="text-left">
                <p class="w-[110px]">Sensação termíca</p>
                <p class="weather_real_feel">18&#176</p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-4 rounded-lg hover:bg-white/5 duration-300">
            <i class=" fa-solid fa-droplet mr-4 text-3xl w-8"></i>
            <div class="text-left">
                <p class="w-[110px]">Humidade</p>
                <p class="weather_humidity">86%</p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-4 rounded-lg hover:bg-white/5 duration-300">
            <i class="fa-solid fa-wind mr-4 text-3xl w-8"></i>
            <div class="text-left">
                <p class="w-[110px]">Vento</p>
                <p class="weather_wind">7.2 m/s</p>
            </div>
        </div>
        <div class="flex items-center bg-slate-800 p-4 rounded-lg hover:bg-white/5 duration-300">
            <i class="fa-solid fa-cloud-showers-heavy mr-4 text-3xl w-8"></i>
            <div class="text-left">
                <p class="w-[110px]">Chuva na ultima hora</p>
                <p class="weather_rain_chance">37%</p>
            </div>
        </div>
    </div>
</div>
<footer class="w-full text-center mt-4">
    <a class="bg-slate-800 text-white rounded-full px-6 py-1.5 align-middle cursor-pointer hover:bg-slate-700 duration-300 weather_extended text-nowrap"
        href="/forecast" onclick="route()">
        Proxímos dias
    </a>
</footer>
