<!DOCTYPE html>
<html lang="pt-BR" class="h-full">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" type="image/x-icon" href="src/assets/weather-forecast.png">
    <link rel="stylesheet" href="/src/output.css">
    <link id="page-css" rel="stylesheet" type="text/css" href="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @media (min-width: 640px) {
            body>div:has(.currentWeatherContainer) {
                max-width: 512px;
            }

            body>div:has(.forecastContainer) {
                max-width: 640px;
            }
        }

        @keyframes skeleton-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .skeleton {
            background-color: #1e293b;
            animation: skeleton-pulse 1.6s ease-in-out infinite;
        }
    </style>
</head>

<body class="h-full bg-slate-950 font-sans text-slate-200
             flex flex-col
             sm:items-center sm:justify-center sm:min-h-full sm:p-6">

    <div class="w-full bg-slate-900
                flex flex-col h-full overflow-hidden
                sm:h-auto sm:rounded-2xl sm:overflow-y-auto sm:shadow-2xl">

        <header class="flex-shrink-0
                       flex flex-col min-[430px]:flex-row
                       items-center justify-between
                       gap-3 px-5 pt-5 pb-4
                       sm:px-8 sm:pt-7 sm:pb-0
                       border-b border-slate-800 sm:border-none">

            <form class="relative w-full min-[430px]:w-auto">
                <input class="w-full min-[430px]:w-auto rounded-lg pl-9 pr-3 py-2
                           bg-slate-800 text-slate-100 placeholder-slate-400
                           text-sm focus:outline-none focus:ring-2 focus:ring-slate-600
                           weather_search" type="text" placeholder="Pesquise a cidade...">
                <button type="submit"
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 duration-150">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </button>
            </form>

            <div class="flex gap-1 flex-shrink-0">
                <span
                    class="py-1 px-3 bg-slate-700 hover:bg-slate-600 rounded-lg cursor-pointer duration-200 text-sm font-medium weather_celcius">
                    °C
                </span>
                <span
                    class="py-1 px-3 bg-slate-800 hover:bg-slate-700 rounded-lg cursor-pointer duration-200 text-sm font-medium weather_farenheit">
                    °F
                </span>
            </div>
        </header>

        <div id="app" class="flex-1 overflow-y-auto
                              pt-20 px-5 py-5
                              sm:pt-16 sm:px-8 sm:py-6
                              sm:overflow-y-auto">
        </div>

    </div>

    <script src="/src/js/index.js" type="module"></script>
</body>

</html>
